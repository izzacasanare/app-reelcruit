name: Initialize Project from Template

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    if: ${{ github.repository != 'MSPbotsAI/app-template' }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔒 Check Initialization Status
        id: check_status
        run: |
          if [ -f ".app-template-initialized" ]; then
            echo "initialized=true" >> $GITHUB_OUTPUT
            echo "Repository already initialized. Skipping."
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: ⚙️ Update Project Name in package.json
        if: steps.check_status.outputs.initialized == 'false'
        run: |
          REPO_NAME=${{ github.event.repository.name }}
          echo "Updating name to '$REPO_NAME' in both root and manifest sections"
          
          jq ".name = \"$REPO_NAME\" | .manifest.name = \"$REPO_NAME\"" package.json > package.json.tmp && mv package.json.tmp package.json

          touch .app-template-initialized

      - name: 💾 Commit and Push Changes
        if: steps.check_status.outputs.initialized == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add package.json .app-template-initialized
          
          git commit -m "chore: initialize project name to $GITHUB_REPOSITORY [skip ci]"
          git push
